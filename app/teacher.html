<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>글쓰기 거울 — 선생님 대시보드</title>
<style>
  :root{
    --bg:#f5f3ff; --card:#fff; --ink:#2d2a45; --muted:#7b7894;
    --brand:#7c6cf0; --brand-d:#5b49d6;
    --green:#3fae72; --green-bg:#e7f7ee; --yellow:#e0a52e; --yellow-bg:#fdf4e0;
    --blue:#3d8fe0; --blue-bg:#e7f1fc; --line:#eceaf6; --radius:20px; --shadow:0 8px 28px rgba(91,73,214,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;line-height:1.6}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  header .logo{font-size:30px}
  header h1{margin:0;font-size:20px;font-weight:800}
  header p{margin:0;font-size:13px;color:var(--muted)}
  header .actions{margin-left:auto;display:flex;gap:8px}
  .btn{border:none;border-radius:14px;padding:10px 16px;font-weight:700;font-size:14px;
    cursor:pointer;font-family:inherit}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff}
  .btn.ghost{background:#f1eeff;color:var(--brand-d)}

  /* 학급 현황 */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
  @media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:var(--brand-d)}
  .stat .l{font-size:12px;color:var(--muted)}

  /* 진행 단계 분포 */
  .progress-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
  .progress-card h2{margin:0 0 12px;font-size:16px}
  .stage-row{display:flex;align-items:center;gap:10px;margin:6px 0}
  .stage-row .name{width:90px;font-size:13px;font-weight:700}
  .bar{flex:1;background:#f1eeff;border-radius:10px;height:18px;overflow:hidden}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-d))}
  .stage-row .cnt{width:40px;text-align:right;font-size:13px;color:var(--muted)}

  /* 학생 카드 */
  .student{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px;margin-bottom:14px}
  .student .head{display:flex;align-items:center;gap:10px;cursor:pointer}
  .student .head .nick{font-size:17px;font-weight:800}
  .student .head .badge-mini{font-size:14px}
  .student .head .meta{margin-left:auto;font-size:12px;color:var(--muted)}
  .student .body{display:none;margin-top:14px}
  .student.open .body{display:block}
  .planrow{font-size:13px;color:var(--muted);margin-bottom:10px}
  .planrow b{color:var(--ink)}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.compare{grid-template-columns:1fr}}
  .doc{background:#faf9ff;border:2px solid var(--line);border-radius:12px;padding:12px;font-size:14px;white-space:pre-wrap;min-height:80px}
  .doc h4{margin:0 0 6px;font-size:13px;color:var(--muted)}
  .note{margin-top:10px;background:var(--yellow-bg);border-radius:12px;padding:10px 12px;font-size:14px}
  .note b{color:var(--yellow)}
  .reflect{margin-top:8px;background:var(--blue-bg);border-radius:12px;padding:10px 12px;font-size:14px}
  .reflect b{color:var(--blue)}
  .fbbox{margin-top:10px;border:2px solid var(--line);border-radius:12px;padding:10px 12px}
  .fbbox h4{margin:0 0 8px;font-size:13px}
  .fbbox .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;margin-left:6px}
  .fbbox .tag.ai{background:var(--brand);color:#fff}
  .fbbox .tag.rule{background:#e9e6f6;color:var(--muted)}
  .mini{font-size:13px;border-radius:8px;padding:6px 10px;margin-top:6px}
  .mini.g{background:var(--green-bg)} .mini.y{background:var(--yellow-bg)} .mini.b{background:var(--blue-bg)}
  .checks{margin-top:8px;font-size:13px;color:var(--muted)}
  .empty{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:40px 20px;text-align:center;color:var(--muted)}

  .print-title{display:none}
  .print-date{display:none}
  @media print{
    body{background:#fff}
    header .actions, .stats, .progress-card,
    .wrap > h2, .student .head .badge-mini, .student .head .meta{display:none !important}
    header p{display:none}
    .student{box-shadow:none;border:1px solid #ddd;border-radius:0;
      page-break-after:always;break-after:page;margin-bottom:0}
    .student:last-child{page-break-after:auto;break-after:auto}
    .student .body{display:block !important}
    .student .head{cursor:default}
    .print-title{display:block;font-size:19px;font-weight:800;margin-bottom:2px}
    .print-date{display:block;font-size:12px;color:var(--muted);margin-bottom:14px}
    .doc{border-color:#ccc}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">👩‍🏫</div>
    <div>
      <h1>선생님 대시보드</h1>
      <p>글쓰기 거울 · 학생이 내보낸 파일을 불러와 한눈에 (서버에 저장하지 않음)</p>
    </div>
    <div class="actions">
      <label class="btn primary" style="cursor:pointer">📂 학생 파일 불러오기
        <input type="file" accept=".json,application/json" multiple style="display:none" onchange="importFiles(this)">
      </label>
      <button class="btn ghost" onclick="printAll()">🖨 인쇄(가정통신용)</button>
      <button class="btn ghost" onclick="exportCSV()">⬇ CSV 내보내기</button>
      <button class="btn ghost" onclick="clearAll()">전체 지우기</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>
  <div class="progress-card">
    <h2>📊 단계별 진행 현황</h2>
    <div id="stages"></div>
  </div>

  <h2 style="font-size:16px;margin:0 0 10px">🧑‍🎓 학생별 제출물</h2>
  <div id="students"></div>
</div>

<script>
const STAGES=[
  {key:'plan', name:'계획하기'},
  {key:'draft', name:'초고'},
  {key:'feedback', name:'AI 피드백'},
  {key:'revise', name:'고쳐쓰기'},
  {key:'reflect', name:'돌아보기'}
];
const CHECKS=[
  "읽는 사람·목적 생각","처음·가운데·끝","스스로 고칠 곳 찾기","왜 고쳤는지 설명"
];

function stageOf(s){
  if(s.reflect && s.reflect.trim()) return 4;
  if(s.changeNote && s.changeNote.trim() || (s.revised && s.revised!==s.draft)) return 3;
  if(s.feedbackDone) return 2;
  if(s.draft && s.draft.trim().length>10) return 1;
  return 0;
}
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function yellowArr(y){ return Array.isArray(y) ? y : (y? [y] : []); }
function yellowText(y){ return Array.isArray(y) ? y.join(' / ') : (y||''); }

/* 초고 ↔ 고친 글 단어 단위 비교(diff): 지운 낱말은 취소선, 새 낱말은 파란 글씨 */
function diffTokens(a,b){
  const ta=a.split(/(\s+)/), tb=b.split(/(\s+)/);
  const n=ta.length, m=tb.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j] = ta[i]===tb[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }
  let i=0,j=0; const ops=[];
  while(i<n && j<m){
    if(ta[i]===tb[j]){ ops.push({type:'equal', text:ta[i]}); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]){ ops.push({type:'del', text:ta[i]}); i++; }
    else{ ops.push({type:'ins', text:tb[j]}); j++; }
  }
  while(i<n){ ops.push({type:'del', text:ta[i]}); i++; }
  while(j<m){ ops.push({type:'ins', text:tb[j]}); j++; }
  return ops;
}
function renderDiffHtml(ops, side){
  return ops
    .filter(op=> op.type==='equal' || (side==='old' && op.type==='del') || (side==='new' && op.type==='ins'))
    .map(op=>{
      if(op.type==='equal') return esc(op.text);
      if(op.type==='del') return `<span style="color:var(--muted);text-decoration:line-through">${esc(op.text)}</span>`;
      return `<span style="color:var(--blue);font-weight:700">${esc(op.text)}</span>`;
    }).join('');
}
function docPairHtml(draft, revised){
  const d=draft||"", r=revised||"";
  if(d && r && d!==r){
    const ops=diffTokens(d, r);
    return { old:renderDiffHtml(ops,'old'), new:renderDiffHtml(ops,'new') };
  }
  return { old: esc(d)||'(없음)', new: esc(r)||'(없음)' };
}

let allStudents=[];

/* 학생이 내보낸 .json 파일을 불러와 화면에만 표시 (서버·저장 없음) */
async function importFiles(input){
  const files=[...input.files];
  for(const f of files){
    try{
      const txt=await f.text();
      const obj=JSON.parse(txt);
      if(!obj.nick){ obj.nick=f.name.replace(/^글쓰기거울_/,'').replace(/\.json$/,''); }
      // 같은 별명이면 교체
      const i=allStudents.findIndex(s=>s.nick===obj.nick);
      if(i>=0) allStudents[i]=obj; else allStudents.push(obj);
    }catch(e){ alert('파일을 읽지 못했어요: '+f.name); }
  }
  input.value='';
  render();
}
function clearAll(){ allStudents=[]; render(); }

function render(){
  const students=allStudents;
  const stEl=document.getElementById('students');
  if(students.length===0){
    document.getElementById('stats').innerHTML='';
    document.getElementById('stages').innerHTML='';
    stEl.innerHTML='<div class="empty">아직 불러온 학생이 없어요.<br>위의 <b>‘학생 파일 불러오기’</b>를 눌러, 학생이 내보낸 <b>글쓰기거울_이름.json</b> 파일을 선택하세요. (여러 개 한 번에 가능)</div>';
    return;
  }

  // 통계
  const total=students.length;
  const badgeCount=students.reduce((a,s)=>a+Object.keys(s.badges||{}).length,0);
  const revisedCount=students.filter(s=>s.revised && s.revised!==s.draft).length;
  const notedCount=students.filter(s=>s.changeNote && s.changeNote.trim()).length;
  const doneCount=students.filter(s=>stageOf(s)===4).length;
  document.getElementById('stats').innerHTML=[
    {n:total,l:'제출한 학생'},
    {n:doneCount,l:'끝까지 완료'},
    {n:revisedCount,l:'고쳐쓴 학생'},
    {n:notedCount,l:'수정 메모 작성'},
    {n:badgeCount,l:'모은 배지 합계'}
  ].map(x=>`<div class="stat"><div class="n">${x.n}</div><div class="l">${x.l}</div></div>`).join('');

  // 단계 분포
  const dist=[0,0,0,0,0];
  students.forEach(s=>{ dist[stageOf(s)]++; });
  document.getElementById('stages').innerHTML=STAGES.map((st,i)=>{
    const c=dist[i]; const pct=total?Math.round(c/total*100):0;
    return `<div class="stage-row"><div class="name">${st.name}</div>
      <div class="bar"><span style="width:${pct}%"></span></div>
      <div class="cnt">${c}명</div></div>`;
  }).join('');

  // 학생 카드
  stEl.innerHTML=students.map((s,idx)=>{
    const stage=stageOf(s);
    const badges=Object.keys(s.badges||{}).length;
    const checks=(s.checks)?Object.values(s.checks).filter(Boolean).length:0;
    const docPair=docPairHtml(s.draft, s.revised);
    return `<div class="student" id="st${idx}">
      <div class="head" onclick="document.getElementById('st${idx}').classList.toggle('open')">
        <span class="nick">${esc(s.nick)||'이름없음'}</span>
        <span class="badge-mini">${'🏅'.repeat(badges)||'—'}</span>
        <span class="meta">${STAGES[stage].name} 단계 · 제출 ${esc(s.submittedAt||'')}</span>
      </div>
      <div class="body">
        <div class="print-title">🪞 ${esc(s.nick)||'학생'}의 글쓰기 평가 결과</div>
        <div class="print-date">출력일 ${new Date().toLocaleDateString('ko-KR')} · 글쓰기 거울</div>
        ${s.title?`<div style="font-weight:800;font-size:15px;margin-bottom:6px">📝 ${esc(s.title)}</div>`:''}
        <div class="planrow">
          <b>종류</b> ${esc(s.genre)||'-'} &nbsp;·&nbsp;
          <b>읽는 사람</b> ${esc(s.reader)||'-'} &nbsp;·&nbsp;
          <b>목적</b> ${esc(s.purpose)||'-'}
        </div>
        <div class="compare">
          <div class="doc"><h4>📄 초고</h4>${docPair.old}</div>
          <div class="doc"><h4>✨ 고쳐 쓴 글</h4>${docPair.new}</div>
        </div>
        ${s.changeNote?`<div class="note"><b>🔧 무엇을·왜 고쳤나:</b> ${esc(s.changeNote)}</div>`:''}
        ${s.reflect?`<div class="reflect"><b>🌱 배운 점:</b> ${esc(s.reflect)}</div>`:''}
        ${s.feedback?`<div class="fbbox">
          <h4>🪞 받은 AI 피드백<span class="tag ${s.feedback.source==='ai'?'ai':'rule'}">${s.feedback.source==='ai'?'Claude AI':'규칙 기반'}</span></h4>
          <div class="mini g">🟢 ${esc(s.feedback.green)}</div>
          ${yellowArr(s.feedback.yellow).map(y=>`<div class="mini y">🟡 ${esc(y)}</div>`).join('')}
          <div class="mini b">🔵 ${esc(s.feedback.blue)}</div>
        </div>`:''}
        <div class="checks">✅ 자기평가 ${checks}/${CHECKS.length} 항목 체크</div>
      </div>
    </div>`;
  }).join('');
}

/* ---------- 인쇄(가정통신용): 학생별 1장씩 출력 ---------- */
function printAll(){
  if(!allStudents.length){ alert('인쇄할 제출물이 없어요. 먼저 학생 파일을 불러오세요.'); return; }
  window.print();
}

/* ---------- CSV 내보내기 (엑셀에서 한글 정상) ---------- */
function csvCell(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; }
function exportCSV(){
  if(!allStudents.length){ alert('내보낼 제출물이 없어요.'); return; }
  const headers=['별명','단계','제출시각','글종류','읽는사람','목적','제목','초고','고쳐쓴글',
    '수정메모','배운점','자기평가(체크수)','배지수','피드백출처','AI_잘한점','AI_다시볼곳','AI_생각해볼질문'];
  const rows=allStudents.map(s=>{
    const fb=s.feedback||{};
    const checks=s.checks?Object.values(s.checks).filter(Boolean).length:0;
    const badges=Object.keys(s.badges||{}).length;
    const src=fb.source==='ai'?'Claude AI':(fb.green?'규칙 기반':'');
    return [s.nick, STAGES[stageOf(s)].name, s.submittedAt, s.genre, s.reader, s.purpose, s.title,
      s.draft, s.revised, s.changeNote, s.reflect, checks+'/'+CHECKS.length, badges,
      src, fb.green, yellowText(fb.yellow), fb.blue].map(csvCell).join(',');
  });
  const csv=String.fromCharCode(0xFEFF)+headers.map(csvCell).join(',')+'\r\n'+rows.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='글쓰기거울_제출물.csv'; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}
render();
</script>
</body>
</html>
